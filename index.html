function _instSetIconMode(ns,mode){
  _instIconType=mode;
  document.querySelectorAll(`#iopt-${ns}-letter,#iopt-${ns}-svg,#iopt-${ns}-image`).forEach(b=>b.classList.remove('active'));
  document.getElementById(`iopt-${ns}-${mode}`)?.classList.add('active');
  const extra=document.getElementById(`inst-${ns}-icon-extra`);
  if(!extra)return;
  if(mode==='letter'){
    extra.innerHTML=`<input class="inst-input" id="inst-${ns}-letter-char" maxlength="2" placeholder="Letter (e.g. Y)" oninput="_instIconData=this.value;_instUpdatePreview('${ns}')" style="width:120px;">`;
  } else if(mode==='svg'){
    extra.innerHTML=`<textarea class="inst-textarea" id="inst-${ns}-svg-code" placeholder="Paste SVG code here..." style="min-height:70px;" oninput="_instIconData=this.value;_instUpdatePreview('${ns}')"></textarea>`;
  } else if(mode==='image'){
    extra.innerHTML=`<div class="inst-upload-zone" onclick="document.getElementById('inst-${ns}-imgup').click()">
      Click to upload image (PNG/JPG/SVG/WebP)
      <input type="file" id="inst-${ns}-imgup" accept="image/*" style="display:none" onchange="_instLoadImg('${ns}',this)">
    </div>`;
  }
  _instUpdatePreview(ns);
}

function _instSetColor(ns,color,el){
  _instIconColor=color;
  document.querySelectorAll(`#inst-${ns}-colorrow .inst-color-dot`).forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
  _instUpdatePreview(ns);
}

function _instUpdatePreview(ns='url'){
  const preview=document.getElementById(`inst-${ns}-ico-preview`);
  if(!preview)return;
  const nameEl=document.getElementById(`inst-${ns}-name`)||document.getElementById('inst-url-name')||document.getElementById('inst-html-name')||document.getElementById('inst-js-name');
  const name=nameEl?nameEl.value||'A':'A';
  const letter=(_instIconType==='letter'&&_instIconData)?_instIconData[0].toUpperCase():(name[0]||'A').toUpperCase();
  preview.style.background=_instIconColor;
  if(_instIconType==='letter'){
    preview.innerHTML=`<span style="font-size:18px;font-weight:700;color:#fff;font-family:var(--font-ui);">${letter}</span>`;
  } else if(_instIconType==='svg'){
    preview.innerHTML=_instIconData||`<span style="font-size:18px;font-weight:700;color:#fff;">${letter}</span>`;
  } else if(_instIconType==='image'&&_instIconData){
    preview.innerHTML=`<img src="${_instIconData}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`;
    preview.style.background='transparent';
  } else {
    preview.innerHTML=`<span style="font-size:18px;font-weight:700;color:#fff;font-family:var(--font-ui);">${letter}</span>`;
  }
}

function _instLoadImg(ns,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{_instIconData=e.target.result;_instIconType='image';_instUpdatePreview(ns);};
  reader.readAsDataURL(file);
}

function _instDropHTML(e){
  e.preventDefault();
  document.getElementById('inst-html-dropzone')?.classList.remove('dragover');
  const file=e.dataTransfer.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{const ta=document.getElementById('inst-html-src');if(ta)ta.value=ev.target.result;};
  reader.readAsText(file);
}

function _instLoadHTMLFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const ta=document.getElementById('inst-html-src');if(ta)ta.value=e.target.result;};
  reader.readAsText(file);
}

function _instInstall(type){
  let name='',data='';
  if(type==='url'){
    name=(document.getElementById('inst-url-name')?.value||'').trim();
    data=(document.getElementById('inst-url-url')?.value||'').trim();
    if(!name){showNotif('Installer','Enter an app name.');return;}
    if(!data){showNotif('Installer','Enter a URL.');return;}
    if(!data.startsWith('http'))data='https://'+data;
  } else if(type==='html'){
    name=(document.getElementById('inst-html-name')?.value||'').trim();
    data=(document.getElementById('inst-html-src')?.value||'').trim();
    if(!name){showNotif('Installer','Enter an app name.');return;}
    if(!data){showNotif('Installer','Paste HTML source or upload a file.');return;}
  } else if(type==='js'){
    name=(document.getElementById('inst-js-name')?.value||'').trim();
    data=(document.getElementById('inst-js-src')?.value||'').trim();
    if(!name){showNotif('Installer','Enter an app name.');return;}
    if(!data){showNotif('Installer','Enter JavaScript code.');return;}
  }
  const id='capp_'+Date.now();
  const iconData=_instIconType==='letter'?
    (document.getElementById(`inst-${type}-letter-char`)?.value||name[0]||'A'):
    _instIconData;
  CUSTOM_APPS.push({id,label:name,iconType:_instIconType,iconData,color:_instIconColor,appType:type,appData:data});
  _rebuildStartMenuCustom();
  _rebuildDesktopCustom();
  _saveState();
  showNotif('App Installed',`"${name}" added to Start Menu and desktop.`);
  // Switch to manage tab to confirm
  _instSwitchTab('manage');
  _rebuildInstallerApps();
}

function _instSwitchTab(tab){
  _instActiveTab=tab;
  document.querySelectorAll('.inst-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.inst-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('itab-'+tab)?.classList.add('active');
  document.getElementById('isec-'+tab)?.classList.add('active');
  if(tab==='manage')_rebuildInstallerApps();
}

function _rebuildInstallerApps(){
  const el=document.getElementById('inst-app-list-el');if(!el)return;
  if(!CUSTOM_APPS.length){el.innerHTML='<div style="color:var(--text-3);font-size:12px;padding:12px 0;">No custom apps installed yet.</div>';return;}
  el.innerHTML='';
  CUSTOM_APPS.forEach(app=>{
    const typeLabels={url:'URL Embed',html:'HTML App',js:'JavaScript'};
    const row=document.createElement('div');row.className='inst-app-item';
    row.innerHTML=`
      ${_customAppIconHTML(app,28)}
      <div class="iai-info">
        <div class="iai-name">${app.label}</div>
        <div class="iai-type">${typeLabels[app.appType]||app.appType}</div>
      </div>
      <div class="iai-actions">
        <button class="inst-btn secondary" style="padding:4px 10px;font-size:11px;" onclick="launchCustomApp('${app.id}');closeStart();">Launch</button>
        <button class="inst-btn danger" style="padding:4px 10px;font-size:11px;" onclick="_instUninstall('${app.id}')">Remove</button>
      </div>`;
    el.appendChild(row);
  });
}

function _instUninstall(id){
  const app=CUSTOM_APPS.find(a=>a.id===id);
  if(!app)return;
  if(!confirm(`Remove "${app.label}"?`))return;
  // Close window if open
  closeWin('custom-'+id);
  CUSTOM_APPS=CUSTOM_APPS.filter(a=>a.id!==id);
  _rebuildStartMenuCustom();
  _rebuildDesktopCustom();
  _rebuildInstallerApps();
  _saveState();
  showNotif('App Removed',`"${app.label}" uninstalled.`);
}

function _rebuildStartMenuCustom(){
  // Remove old custom btns then re-add
  document.querySelectorAll('#sm-app-grid .sm-app-btn[data-custom]').forEach(b=>b.remove());
  const grid=document.getElementById('sm-app-grid');
  CUSTOM_APPS.forEach(app=>{
    const btn=document.createElement('button');
    btn.className='sm-app-btn';btn.dataset.label=app.label.toLowerCase();btn.dataset.custom='1';
    btn.innerHTML=`<span class="sa-ico">${_customAppIconHTML(app,28)}</span>${app.label}`;
    btn.onclick=()=>{launchCustomApp(app.id);closeStart();};
    grid.appendChild(btn);
  });
}

function _rebuildDesktopCustom(){
  document.querySelectorAll('#desktop-icons .desk-icon[data-custom]').forEach(d=>d.remove());
  const container=document.getElementById('desktop-icons');
  CUSTOM_APPS.forEach(app=>{
    const d=document.createElement('div');d.className='desk-icon';d.dataset.custom='1';
    d.innerHTML=`<div class="di-icon">${_customAppIconHTML(app,40)}</div><div class="di-label">${app.label}</div>`;
    d.ondblclick=()=>launchCustomApp(app.id);
    container.appendChild(d);
  });
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
buildStartMenu();
buildDesktopIcons();

// Boot asynchronously so IDB can restore state before showing UI
(async()=>{
  // Show a brief loading state on the desktop
  const loadEl=document.createElement('div');
  loadEl.id='boot-loader';
  loadEl.style.cssText='position:fixed;inset:0;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999999;';
  loadEl.innerHTML=`
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="20" fill="var(--accent2)" opacity="0.2" stroke="var(--accent)" stroke-width="1.5"/>
      <circle cx="24" cy="24" r="12" fill="var(--accent)" opacity="0.4"/>
      <circle cx="24" cy="24" r="6" fill="var(--accent)"/>
      <circle cx="24" cy="24" r="2.5" fill="#0d1117"/>
    </svg>
    <div style="font-size:13px;font-weight:600;color:var(--text-2);font-family:var(--font-ui);letter-spacing:0.5px;">Loading Solus OS…</div>
    <div class="hr-spinner" style="width:28px;height:28px;border-width:2px;"></div>`;
  document.body.appendChild(loadEl);

  // Check first-boot BEFORE restoring
  let _isFirstBoot=false;
  try{ _isFirstBoot=!(await _dbGet('state','hasBooted')); }catch(e){ _isFirstBoot=true; }
  _dbPut('state','hasBooted',true);

  if(_isFirstBoot){
    // No saved state — apply defaults and seed the FS
    applyTheme('blue');
    applyFont('inter');
    applyIconSize('medium');
    initFS();
  } else {
    // Restore everything from IDB — _booting=true keeps saves suppressed
    await _loadPersistedState();
  }

  // Boot complete — re-enable saves
  _booting=false;

  // Rebuild desktop icons (custom apps restored by _loadPersistedState)
  buildDesktopIcons();
  _rebuildDesktopCustom();

  // Remove boot loader
  loadEl.remove();

  // Show welcome notif
  setTimeout(()=>{
    showNotif('Solus OS','Lite Browser OS powered by Scramjet. Ready.');
    if(_isFirstBoot) openAbout();
  },300);
})();
</script>
